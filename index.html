<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Vacantes · Lau</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --sage: #5c7a5c;
    --sage-light: #8aaa82;
    --terra: #b5602a;
    --mist: #e2dbd0;
    --gold: #c9a84c;
    --white: #fdfaf5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2.5rem 3rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: var(--sage);
    opacity: 0.18;
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: var(--terra);
    opacity: 0.1;
    pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1 em { font-style: italic; color: var(--sage-light); }

  .header-sub {
    margin-top: 0.4rem;
    font-size: 0.78rem;
    opacity: 0.55;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .last-updated {
    font-size: 0.72rem;
    opacity: 0.4;
    margin-top: 0.3rem;
    font-style: italic;
  }

  .keyword-strip {
    margin-top: 1.4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }
  .keyword-strip .label {
    font-size: 0.68rem;
    opacity: 0.4;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.2rem;
  }
  .keyword-strip .kw {
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.2rem 0.65rem;
    border: 1px solid rgba(245,240,232,0.2);
    border-radius: 2px;
    color: var(--paper);
    opacity: 0.7;
  }

  /* MAIN */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 2rem 2rem 5rem;
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    font-weight: 500;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--mist);
  }

  /* PORTALS */
  .portals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 0.65rem;
    margin-bottom: 3rem;
  }
  .portal-card {
    background: var(--white);
    border: 1px solid var(--mist);
    padding: 0.9rem 1.1rem;
    text-decoration: none;
    color: var(--ink);
    display: block;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
  }
  .portal-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--sage);
    transform: scaleY(0);
    transition: transform 0.2s ease;
    transform-origin: bottom;
  }
  .portal-card:hover::before { transform: scaleY(1); }
  .portal-card:hover {
    border-color: var(--sage);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(92,122,92,0.12);
  }
  .portal-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.92rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }
  .portal-desc {
    font-size: 0.7rem;
    opacity: 0.5;
    line-height: 1.4;
  }
  .portal-tag {
    display: inline-block;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--mist);
    padding: 0.12rem 0.4rem;
    border-radius: 1px;
    margin-top: 0.45rem;
    color: var(--sage);
    font-weight: 500;
  }

  /* SEARCH BAR */
  .search-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .search-row input {
    flex: 1;
    min-width: 200px;
    background: var(--white);
    border: 1px solid var(--mist);
    padding: 0.6rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: var(--sage); }
  .search-row input::placeholder { opacity: 0.35; }

  .btn {
    background: var(--sage);
    color: var(--white);
    border: none;
    padding: 0.6rem 1.3rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 500;
  }
  .btn:hover { background: var(--ink); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; background: var(--sage); }
  .btn-outline {
    background: transparent;
    color: var(--sage);
    border: 1px solid var(--sage);
  }
  .btn-outline:hover { background: var(--sage); color: var(--white); }

  /* CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .chip {
    font-size: 0.7rem;
    padding: 0.28rem 0.7rem;
    border: 1px solid var(--sage);
    background: var(--sage);
    color: var(--white);
    cursor: pointer;
    border-radius: 2px;
    user-select: none;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .chip:hover { background: var(--terra); border-color: var(--terra); }

  /* STATUS */
  .status {
    font-size: 0.78rem;
    color: var(--sage);
    font-style: italic;
    min-height: 1.4em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .status.error { color: var(--terra); }

  .spinner {
    width: 13px; height: 13px;
    border: 2px solid var(--mist);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* JOB CARDS */
  .jobs { display: flex; flex-direction: column; gap: 0.7rem; }

  .job-card {
    background: var(--white);
    border: 1px solid var(--mist);
    padding: 1.15rem 1.4rem;
    transition: all 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .job-card:hover {
    border-color: var(--sage);
    box-shadow: 0 3px 14px rgba(92,122,92,0.1);
  }

  .job-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.4rem;
  }
  .job-org {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--terra);
    font-weight: 500;
  }
  .sep { opacity: 0.25; font-size: 0.6rem; }
  .job-country { font-size: 0.68rem; opacity: 0.5; }
  .job-date { font-size: 0.66rem; opacity: 0.38; margin-left: auto; font-style: italic; }

  .job-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.45rem;
  }
  .job-title a { text-decoration: none; color: inherit; }
  .job-title a:hover { color: var(--sage); }

  .job-excerpt {
    font-size: 0.78rem;
    opacity: 0.55;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .job-footer {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.8rem;
  }
  .job-type {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.18rem 0.55rem;
    background: var(--mist);
    color: var(--sage);
    font-weight: 500;
  }
  .job-deadline {
    font-size: 0.66rem;
    opacity: 0.42;
    margin-left: auto;
  }
  .job-deadline.urgent { color: var(--terra); opacity: 1; font-weight: 500; }
  .job-link {
    font-size: 0.7rem;
    color: var(--sage);
    text-decoration: none;
    border-bottom: 1px solid var(--sage-light);
    padding-bottom: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .job-link:hover { color: var(--terra); border-color: var(--terra); }

  /* EMPTY / ERROR */
  .message-box {
    text-align: center;
    padding: 3rem 1rem;
    opacity: 0.45;
  }
  .message-box p {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-style: italic;
  }
  .message-box small {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    font-style: normal;
  }

  /* PAGINATION */
  .pagination {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    justify-content: center;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .page-info { font-size: 0.76rem; opacity: 0.45; margin: 0 0.4rem; }

  /* FOOTER */
  footer {
    background: var(--ink);
    color: var(--paper);
    padding: 1.2rem 3rem;
    font-size: 0.7rem;
    opacity: 0.8;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  footer a { color: var(--sage-light); text-decoration: none; }
  footer a:hover { color: var(--gold); }

  @media (max-width: 640px) {
    header { padding: 1.5rem 1.2rem; }
    h1 { font-size: 1.7rem; }
    main { padding: 1.5rem 1rem 4rem; }
    .portals-grid { grid-template-columns: 1fr 1fr; }
    footer { padding: 1rem 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Job <em>Monitor</em></h1>
    <p class="header-sub">Derecho ambiental &amp; Política · LAC Focus</p>
    <p class="last-updated" id="lastUpdated"></p>
    <div class="keyword-strip">
      <span class="label">Keywords:</span>
      <span class="kw">environmental law</span>
      <span class="kw">biodiversity</span>
      <span class="kw">climate change</span>
      <span class="kw">wetlands</span>
      <span class="kw">environmental justice</span>
    </div>
  </div>
</header>

<main>

  <!-- PORTALES DIRECTOS -->
  <div class="section-label">Portales directos — búsquedas pre-filtradas</div>
  <div class="portals-grid" id="portalsGrid"></div>

  <!-- RELIEFWEB EN VIVO -->
  <div class="section-label">ReliefWeb — vacantes en tiempo real</div>

  <div class="search-row">
    <input type="text" id="kwInput" placeholder="Agregar keyword y presionar Enter…">
    <button class="btn" id="searchBtn" onclick="buscar()">Buscar</button>
    <button class="btn btn-outline" onclick="resetear()">Resetear</button>
  </div>

  <div class="chips" id="chips"></div>
  <div class="status" id="status"></div>
  <div class="jobs" id="jobs"></div>
  <div class="pagination" id="pagination"></div>

</main>

<footer>
  <span>Monitor de vacantes · <span id="footerYear"></span></span>
  <span>
    <a href="https://reliefweb.int/jobs" target="_blank">ReliefWeb</a> ·
    <a href="https://jobs.undp.org" target="_blank">UNDP</a> ·
    <a href="https://iucn.org/jobs" target="_blank">IUCN</a> ·
    <a href="https://careers.un.org" target="_blank">UN Careers</a>
  </span>
</footer>

<script>
// ── PORTALES ────────────────────────────────────────────────────────────────
const PORTALES = [
  { name:"ReliefWeb",         desc:"Principal agregador ONG e IINN",          tag:"API activa",          url:"https://reliefweb.int/jobs?search=environmental+law+biodiversity+climate" },
  { name:"UNDP Jobs",         desc:"PNUD — vacantes globales y LAC",           tag:"directo",             url:"https://jobs.undp.org/cj_view_jobs.cfm?q=environment" },
  { name:"UNEP",              desc:"Programa ONU para el Medio Ambiente",      tag:"directo",             url:"https://www.unep.org/about-un-environment/employment-vacancies" },
  { name:"IUCN / UICN",      desc:"Unión Internacional para la Conservación", tag:"directo",             url:"https://iucn.org/jobs?keywords=environmental+law+biodiversity" },
  { name:"GEF",               desc:"Global Environment Facility",              tag:"directo",             url:"https://www.thegef.org/careers" },
  { name:"TNC",               desc:"The Nature Conservancy",                   tag:"directo",             url:"https://careers.nature.org/psc/tnccareers/EMPLOYEE/HRMS/c/HRS_HRAM_FL.HRS_CG_SEARCH_FL.GBL" },
  { name:"Oxfam",             desc:"Justicia climática y ambiental",           tag:"directo",             url:"https://jobs.oxfam.org.uk/?query=environment+climate&location=latin+america" },
  { name:"Rewilding Arg.",    desc:"Rewilding Argentina y organizaciones aliadas", tag:"directo",         url:"https://rewildingargentina.org/trabaja-con-nosotros/" },
  { name:"DevEx",             desc:"Desarrollo internacional — senior roles",  tag:"registro sugerido",   url:"https://www.devex.com/jobs/search#?q%5B%5D=environmental%20law&q%5B%5D=biodiversity" },
  { name:"UN Careers",        desc:"Secretaría ONU — P y D grades",            tag:"directo",             url:"https://careers.un.org/lbw/home.aspx?viewtype=SJ&search=environment" },
  { name:"BID / IDB",         desc:"Banco Interamericano de Desarrollo",       tag:"directo",             url:"https://jobs.iadb.org/en?q=environment+climate+biodiversity" },
  { name:"GIZ",               desc:"Cooperación alemana — LAC",                tag:"directo",             url:"https://jobs.giz.de/en/jobs.html?search=environment+argentina" },
];

// ── KEYWORDS ────────────────────────────────────────────────────────────────
const KW_DEFAULT = [
  "environmental law", "biodiversity", "climate change",
  "wetlands", "environmental justice"
];
let keywords = [...KW_DEFAULT];
let todosLosJobs = [];
let pagina = 1;
const POR_PAGINA = 15;

// ── INICIO ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderPortales();
  renderChips();
  buscar();

  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    'Actualizado: ' + now.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('footerYear').textContent = now.getFullYear();

  document.getElementById('kwInput').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const v = e.target.value.trim().toLowerCase();
    if (v && !keywords.includes(v)) {
      keywords.push(v);
      e.target.value = '';
      renderChips();
      buscar();
    } else {
      e.target.value = '';
    }
  });
});

// ── PORTALES ────────────────────────────────────────────────────────────────
function renderPortales() {
  document.getElementById('portalsGrid').innerHTML = PORTALES.map(p => `
    <a class="portal-card" href="${p.url}" target="_blank" rel="noopener noreferrer">
      <div class="portal-name">${p.name}</div>
      <div class="portal-desc">${p.desc}</div>
      <span class="portal-tag">${p.tag}</span>
    </a>
  `).join('');
}

// ── CHIPS ────────────────────────────────────────────────────────────────────
function renderChips() {
  document.getElementById('chips').innerHTML = keywords.map((kw, i) => `
    <span class="chip" onclick="quitarKw(${i})" title="Clic para quitar">${kw} ×</span>
  `).join('');
}

function quitarKw(i) {
  keywords.splice(i, 1);
  renderChips();
  if (keywords.length) buscar();
  else {
    todosLosJobs = [];
    setStatus('Agregá al menos una keyword para buscar.', false);
    document.getElementById('jobs').innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
  }
}

function resetear() {
  keywords = [...KW_DEFAULT];
  document.getElementById('kwInput').value = '';
  renderChips();
  buscar();
}

// ── API RELIEFWEB ────────────────────────────────────────────────────────────
async function buscar() {
  if (!keywords.length) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  pagina = 1;
  setStatus('Buscando en ReliefWeb…', true);
  document.getElementById('jobs').innerHTML = '';
  document.getElementById('pagination').innerHTML = '';

  // Construimos la query: buscamos en título Y en cuerpo por separado y mezclamos
  const resultados = await Promise.allSettled([
    fetchRW('title'),
    fetchRW('body')
  ]);

  const seenIds = new Set();
  const merged = [];
  for (const r of resultados) {
    if (r.status === 'fulfilled') {
      for (const item of r.value) {
        if (!seenIds.has(item.id)) {
          seenIds.add(item.id);
          merged.push(item);
        }
      }
    }
  }

  merged.sort((a, b) =>
    new Date(b.fields['date.created'] || 0) - new Date(a.fields['date.created'] || 0)
  );

  todosLosJobs = merged;
  btn.disabled = false;

  if (!merged.length) {
    setStatus('No se encontraron vacantes para estos términos.', false);
    return;
  }

  setStatus(`${merged.length} vacante${merged.length !== 1 ? 's' : ''} encontrada${merged.length !== 1 ? 's' : ''} · keywords: ${keywords.join(', ')}`, false);
  renderPagina();
}

async function fetchRW(campo) {
  const payload = {
    filter: {
      operator: "AND",
      conditions: [
        { field: "status", value: "open" },
        {
          operator: "OR",
          conditions: keywords.map(kw => ({ field: campo, value: kw }))
        }
      ]
    },
    fields: {
      include: ["title", "body", "date.created", "date.closing", "country", "source", "type"]
    },
    sort: ["date.created:desc"],
    limit: 100
  };

  // Usamos allorigins como proxy para evitar CORS
  const apiUrl = 'https://api.reliefweb.int/v1/jobs?appname=lau-job-monitor';
  const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl);

  const res = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!res.ok) throw new Error('HTTP ' + res.status);
  const wrapper = await res.json();
  const data = JSON.parse(wrapper.contents);
  return data.data || [];
}

// ── RENDER JOBS ──────────────────────────────────────────────────────────────
function renderPagina() {
  const start = (pagina - 1) * POR_PAGINA;
  const slice = todosLosJobs.slice(start, start + POR_PAGINA);
  const container = document.getElementById('jobs');

  if (!slice.length) {
    container.innerHTML = `<div class="message-box"><p>Sin resultados en esta página.</p></div>`;
    renderPaginacion();
    return;
  }

  container.innerHTML = slice.map((job, i) => {
    const f = job.fields;
    const titulo  = f.title || 'Sin título';
    const org     = f.source?.[0]?.name || '—';
    const pais    = f.country?.[0]?.name || 'Global / Remoto';
    const tipo    = f.type?.[0]?.name || '';
    const creado  = f['date.created'] ? fmtFecha(f['date.created']) : '';
    const cierre  = f['date.closing'] || null;
    const cuerpo  = f.body ? stripHtml(f.body).slice(0, 200) + '…' : '';
    const url     = `https://reliefweb.int/job/${job.id}`;
    const urgente = cierre && diasRestantes(cierre) <= 7 && diasRestantes(cierre) >= 0;

    return `
      <div class="job-card" style="animation-delay:${i * 0.035}s">
        <div class="job-meta">
          <span class="job-org">${org}</span>
          <span class="sep">●</span>
          <span class="job-country">${pais}</span>
          ${creado ? `<span class="job-date">${creado}</span>` : ''}
        </div>
        <div class="job-title"><a href="${url}" target="_blank" rel="noopener">${titulo}</a></div>
        ${cuerpo ? `<div class="job-excerpt">${cuerpo}</div>` : ''}
        <div class="job-footer">
          ${tipo ? `<span class="job-type">${tipo}</span>` : ''}
          ${cierre ? `<span class="job-deadline ${urgente ? 'urgent' : ''}">
            ${urgente ? '⚠ ' : ''}Cierre: ${fmtFecha(cierre)}${urgente ? ' (' + diasRestantes(cierre) + ' días)' : ''}
          </span>` : ''}
          <a class="job-link" href="${url}" target="_blank" rel="noopener">Ver vacante →</a>
        </div>
      </div>
    `;
  }).join('');

  renderPaginacion();
}

function renderPaginacion() {
  const total = Math.ceil(todosLosJobs.length / POR_PAGINA);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = `
    <button class="btn btn-outline" onclick="irPagina(${pagina - 1})" ${pagina === 1 ? 'disabled' : ''}>← Anterior</button>
    <span class="page-info">Página ${pagina} de ${total}</span>
    <button class="btn btn-outline" onclick="irPagina(${pagina + 1})" ${pagina === total ? 'disabled' : ''}>Siguiente →</button>
  `;
}

function irPagina(n) {
  const total = Math.ceil(todosLosJobs.length / POR_PAGINA);
  if (n < 1 || n > total) return;
  pagina = n;
  renderPagina();
  window.scrollTo({ top: 400, behavior: 'smooth' });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function setStatus(msg, cargando) {
  const el = document.getElementById('status');
  el.className = 'status';
  el.innerHTML = cargando
    ? `<span class="spinner"></span>${msg}`
    : msg;
}

function fmtFecha(str) {
  return new Date(str).toLocaleDateString('es-AR', { day:'numeric', month:'short', year:'numeric' });
}

function diasRestantes(str) {
  return Math.ceil((new Date(str) - new Date()) / 86400000);
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}
</script>
</body>
</html>
